<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guro-gu, Seoul, Geumcheon-ro 18 Location</title>
</head>
<body>
    <!-- 지도가 표시될 div -->
    <div id="map" style="width:100%;height:400px;"></div>

    <!-- 카카오지도 API 스크립트 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7840ffe1e515c6c72f07ba3e3da854f2"></script>

    <script>
        // 카카오맵 SDK 로드 완료 시 호출되는 콜백 함수
        kakao.maps.load(function() {
            // 주소-좌표 변환 객체 생성
            var geocoder = new kakao.maps.services.Geocoder();

            // 주소로 좌표를 검색
            geocoder.addressSearch('서울시 구로구 금천로 18', function(result, status) {
                // 주소-좌표 변환 결과를 처리할 콜백 함수
                if (status === kakao.maps.services.Status.OK) {
                    // 검색된 좌표를 지도 중심으로 설정
                    var center = new kakao.maps.LatLng(result[0].y, result[0].x);
                    var options = {
                        center: center,
                        level: 3
                    };

                    // 지도를 표시할 div
                    var container = document.getElementById('map');
                    // 지도 생성
                    var map = new kakao.maps.Map(container, options);

                    // 지도에 마커 표시
                    var marker = new kakao.maps.Marker({
                        position: center,
                        map: map
                    });
                }
            });
        });
    </script>
</body>
</html>
